name: HIITTimer
options:
  bundleIdPrefix: com.mitchellbernstein
  deploymentTarget:
    iOS: "26.1"
  xcodeVersion: "26.5"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  HIITTimer:
    type: application
    platform: iOS
    sources:
      - Sources/HIITTimer
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.mitchellbernstein.hiittimer
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: "HIIT Timer"
        CFBundleDisplayName: "HIIT Timer"
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UIStatusBarStyle: UIStatusBarStyleDarkContent
        UIViewControllerBasedStatusBarAppearance: false
        NSAppleMusicUsageDescription: "HIIT Timer uses Apple Music to play workout tracks during your training sessions."
        UIBackgroundModes: [audio]
